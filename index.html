<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投球跨步生物力學參數探索器</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        h2 { text-align: center; color: #2c3e50; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        input[type=range], select { width: 100%; padding: 8px; margin-bottom: 10px; }
        .dashboard { display: flex; justify-content: space-between; background: #ecf0f1; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .metric { text-align: center; flex: 1; }
        .metric-value { font-size: 24px; font-weight: bold; color: #e74c3c; margin-top: 10px; transition: color 0.3s; }
        .safe { color: #27ae60; }
        .warning { color: #f39c12; }
        .danger { color: #c0392b; }
        #note { margin-top: 25px; padding: 15px; border-left: 5px solid #3498db; background: #e8f4f8; font-size: 0.9em; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚾ 投球跨步生物力學探索器</h2>
    
    <div class="control-group">
        <label for="strideType">跨步型態 (Stride Type)</label>
        <select id="strideType" onchange="calculate()">
            <option value="DD">推蹬投法 (Dip-and-Drive)</option>
            <option value="TF">高壓投法 (Tall-and-Fall)</option>
        </select>
    </div>

    <div class="control-group">
        <label for="strideLength">跨步距離 (Stride Length): <span id="lengthVal">80</span>% 身高</label>
        <input type="range" id="strideLength" min="60" max="100" value="80" oninput="calculate()">
    </div>

    <div class="control-group">
        <label for="timing">前導腳著地時序 (Foot Contact Timing)</label>
        <select id="timing" onchange="calculate()">
            <option value="Normal">正常 (骨盆準備好時著地)</option>
            <option value="Early">過早 (Early / Premature)</option>
            <option value="Late">過晚 (Late)</option>
        </select>
    </div>

    <div class="dashboard">
        <div class="metric">
            <div>球速潛力</div>
            <div id="velo" class="metric-value safe">145 km/h</div>
        </div>
        <div class="metric">
            <div>手肘外翻應力</div>
            <div id="elbow" class="metric-value safe">正常</div>
        </div>
        <div class="metric">
            <div>肩膀負荷</div>
            <div id="shoulder" class="metric-value safe">正常</div>
        </div>
    </div>

    <div id="note">
        <strong>文獻依據：</strong><br>
        <span id="noteText">目前參數為理想狀態。良好的推蹬與適當的步距能有效轉移能量至上肢。</span>
    </div>
</div>

<script>
    function calculate() {
        const type = document.getElementById('strideType').value;
        const length = parseInt(document.getElementById('strideLength').value);
        const timing = document.getElementById('timing').value;
        
        document.getElementById('lengthVal').innerText = length;

        let velo = 145;
        let elbowScore = 0; // 0: Safe, 1: Warning, 2: Danger
        let shoulderScore = 0;
        let note = "";

        // 步距邏輯 (Solomito et al., 2020)
        if (length < 75) {
            velo -= 5;
            elbowScore += 1;
            shoulderScore += 1;
            note += "⚠️ 步距過短 (<75%)：Solomito (2020) 指出這會導致軀幹提早旋轉，顯著增加手肘外翻力矩與肩膀負擔。<br>";
        } else if (length > 90) {
            velo -= 2;
            note += "ℹ️ 步距過長：可能影響前導腳的煞車機制 (Bracing)，導致動量轉換效率下降。<br>";
        }

        // 時序邏輯 (Tanaka et al., 2020)
        if (timing === "Early") {
            velo -= 8;
            elbowScore += 2;
            shoulderScore += 2;
            note += "🚨 著地過早：Tanaka (2020) 強調這會引發「手臂滯後(Arm drag)」，動力鍊斷裂，導致手肘與肩膀承受極大拉扯應力！<br>";
        } else if (timing === "Late") {
            velo -= 5;
            note += "⚠️ 著地過晚：能量無法及時傳遞，球速潛力下降。<br>";
        }

        // 型態邏輯 (Chen et al., 2021)
        if (type === "TF") {
            if (length >= 75 && timing === "Normal") {
                note += "💡 高壓投法：Chen (2021) 指出此型態較不依賴下肢推蹬，但需要極強的軀幹旋轉與核心力量來維持球速。<br>";
            }
        } else {
             if (length >= 75 && timing === "Normal") {
                note += "💡 推蹬投法：良好的下肢發力能產生極大的地面反作用力 (GRF)，是產生高球速的優勢基礎。<br>";
            }
        }

        // 更新介面
        document.getElementById('velo').innerText = velo + " km/h";
        
        const elbowEl = document.getElementById('elbow');
        if (elbowScore === 0) { elbowEl.innerText = "正常"; elbowEl.className = "metric-value safe"; }
        else if (elbowScore === 1) { elbowEl.innerText = "偏高"; elbowEl.className = "metric-value warning"; }
        else { elbowEl.innerText = "危險"; elbowEl.className = "metric-value danger"; }

        const shoulderEl = document.getElementById('shoulder');
        if (shoulderScore === 0) { shoulderEl.innerText = "正常"; shoulderEl.className = "metric-value safe"; }
        else if (shoulderScore === 1) { shoulderEl.innerText = "偏高"; shoulderEl.className = "metric-value warning"; }
        else { shoulderEl.innerText = "危險"; shoulderEl.className = "metric-value danger"; }

        document.getElementById('noteText').innerHTML = note;
    }
    
    // 初始化執行一次
    calculate();
</script>

</body>
</html>
