<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投球步幅與肩肘負荷分析儀</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --safe-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #34495e;
        }

        /* 儀表板樣式 */
        .dashboard {
            margin-top: 30px;
            padding: 20px;
            background: #fcfcfc;
            border-radius: 12px;
            border: 1px solid #eee;
            text-align: center;
            display: none; /* 初始隱藏 */
        }

        .gauge-container {
            width: 100%;
            height: 20px;
            background-color: #eee;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .gauge-fill {
            height: 100%;
            width: 0%;
            background-color: var(--safe-color);
            transition: width 0.5s ease-in-out, background-color 0.5s;
        }

        .multiplier-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 10px 0;
        }

        .risk-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .data-list {
            text-align: left;
            font-size: 0.85rem;
            margin-top: 20px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>投球步幅與負荷分析</h1>
    
    <div class="input-group">
        <label>投手身高 (cm)</label>
        <input type="number" id="height" placeholder="例如: 180" value="180">
    </div>

    <div class="input-group">
        <label>跨步長度 (cm)</label>
        <input type="number" id="stride" placeholder="例如: 150" value="144">
    </div>

    <button onclick="calculateAnalysis()">開始分析</button>

    <div id="resultDashboard" class="dashboard">
        <div style="font-size: 0.9rem; color: #888;">估算肩肘負荷倍數</div>
        <div id="multiplierDisplay" class="multiplier-value">1.0x</div>
        
        <div class="gauge-container">
            <div id="gaugeFill" class="gauge-fill"></div>
        </div>

        <div id="riskBadge" class="risk-badge">計算中...</div>

        <div class="data-list" id="detailData">
            </div>
    </div>
</div>

<script>
    function calculateAnalysis() {
        const height = parseFloat(document.getElementById('height').value);
        const stride = parseFloat(document.getElementById('stride').value);
        
        if (!height || !stride) {
            alert("請輸入完整數據");
            return;
        }

        // 1. 計算步幅比 (Stride length as % of body height)
        const strideRatio = (stride / height) * 100;
        
        // 2. 核心邏輯：計算負荷倍數 (簡化生物力學模型)
        // 理想步幅通常在身高的 75%-90% 之間。
        // 超過 100% 身高或低於 70% 可能導致動力鏈斷裂，增加肩肘代償。
        let multiplier = 1.0;
        if (strideRatio > 85) {
            multiplier += (strideRatio - 85) * 0.05; // 每超過1%，負荷增加0.05倍
        } else if (strideRatio < 75) {
            multiplier += (75 - strideRatio) * 0.03; 
        }

        // 顯示儀表板
        const dashboard = document.getElementById('resultDashboard');
        dashboard.style.display = 'block';

        // 更新數據
        const multiplierDisplay = document.getElementById('multiplierDisplay');
        const gaugeFill = document.getElementById('gaugeFill');
        const riskBadge = document.getElementById('riskBadge');
        const detailData = document.getElementById('detailData');

        multiplierDisplay.innerText = multiplier.toFixed(1) + 'x';
        
        // 更新進度條 (以 2.0x 為 100%)
        const progress = (multiplier / 2.0) * 100;
        gaugeFill.style.width = Math.min(progress, 100) + '%';

        // 判斷風險等級與顏色
        if (multiplier < 1.3) {
            gaugeFill.style.backgroundColor = '#27ae60'; // 綠
            riskBadge.style.backgroundColor = '#27ae60';
            riskBadge.innerText = '正常範圍 - 風險低';
        } else if (multiplier < 1.6) {
            gaugeFill.style.backgroundColor = '#f39c12'; // 黃
            riskBadge.style.backgroundColor = '#f39c12';
            riskBadge.innerText = '負荷偏高 - 請注意疲勞';
        } else {
            gaugeFill.style.backgroundColor = '#e74c3c'; // 紅
            riskBadge.style.backgroundColor = '#e74c3c';
            riskBadge.innerText = '高受傷風險 - 建議優化步幅';
        }

        // 顯示詳細內容
        detailData.innerHTML = `
            • 步幅比：${strideRatio.toFixed(1)}% 身高<br>
            • 建議範圍：75% - 85% 身高 (${(height*0.75).toFixed(0)}cm - ${(height*0.85).toFixed(0)}cm)<br>
            • 生物力學提示：${getHint(strideRatio)}
        `;
    }

    function getHint(ratio) {
        if (ratio > 90) return "步幅過大，可能導致軀幹過早旋轉，增加肩部內旋負荷。";
        if (ratio < 70) return "步幅過小，動力傳導不足，可能導致过度依賴手臂發力。";
        return "步幅適中，有利於動力鏈從下肢傳導至上肢。";
    }
</script>

</body>
</html>
