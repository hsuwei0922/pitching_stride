<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棒球投球生物力學分析儀</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #007AFF;
            --safe: #34C759;
            --warning: #FFCC00;
            --danger: #FF3B30;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .card {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9fb;
            border-radius: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .slider-box {
            text-align: center;
            padding: 10px 0;
        }

        input[type="range"] {
            width: 100%;
            margin: 15px 0;
            -webkit-appearance: none;
            background: #e0e0e0;
            height: 6px;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .stride-info {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        #resultArea {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .multiplier {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 5px 0;
            letter-spacing: -2px;
        }

        .gauge-bg {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }

        .gauge-bar {
            height: 100%;
            width: 0%;
            background: var(--safe);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .status-tag {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 8px;
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .analysis-text {
            text-align: left;
            font-size: 0.85rem;
            color: #555;
            line-height: 1.6;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>投球步幅與負荷分析儀</h1>

    <div class="section">
        <label>投手身高 (cm)</label>
        <input type="number" id="height" value="180" oninput="updateRange()">
        
        <label style="margin-top:15px;">跨步模式</label>
        <select id="pitchingMode">
            <option value="tall">高壓式 (Tall-and-Fall)</option>
            <option value="drive">下沉式 (Dip-and-Drive)</option>
        </select>
    </div>

    <div class="section">
        <label>跨步距離</label>
        <div class="slider-box">
            <div class="stride-info">
                <span id="displayCm">144 cm</span>
                <span id="displayPct">80% 身高</span>
            </div>
            <input type="range" id="strideSlider" oninput="syncLabels(this.value)">
        </div>
    </div>

    <div class="section">
        <label>啟動時機 (Timing)</label>
        <select id="timing">
            <option value="1.0">正常時機 (On Time)</option>
            <option value="1.25">過早開胸 (Early Rotation)</option>
            <option value="1.15">手臂滯後 (Arm Drag)</option>
        </select>
    </div>

    <button class="btn" onclick="runAnalysis()">開始計算</button>

    <div id="resultArea">
        <div style="font-size: 0.8rem; color: #999; font-weight: 600;">肩肘負荷預估值</div>
        <div id="multText" class="multiplier">1.00x</div>
        
        <div class="gauge-bg">
            <div id="gaugeBar" class="gauge-bar"></div>
        </div>

        <div id="statusTag" class="status-tag">分析中</div>
        
        <div class="analysis-text" id="analysisText"></div>
    </div>
</div>

<script>
    function updateRange() {
        const h = document.getElementById('height').value;
        const s = document.getElementById('strideSlider');
        s.min = Math.round(h * 0.5);
        s.max = Math.round(h * 1.2);
        if(s.value > s.max) s.value = s.max;
        syncLabels(s.value);
    }

    function syncLabels(val) {
        const h = document.getElementById('height').value;
        const pct = ((val / h) * 100).toFixed(1);
        document.getElementById('displayCm').innerText = val + " cm";
        document.getElementById('displayPct').innerText = pct + "% 身高";
    }

    function runAnalysis() {
        const h = parseFloat(document.getElementById('height').value);
        const s = parseFloat(document.getElementById('strideSlider').value);
        const mode = document.getElementById('pitchingMode').value;
        const timing = parseFloat(document.getElementById('timing').value);
        
        const ratio = (s / h) * 100;
        let baseLoad = 1.0;
        
        // 模式特有的生物力學邏輯
        let strideImpact = 0;
        if (mode === 'tall') {
            // Tall-and-Fall 理想在 75-85%，超過 88% 負荷劇增
            if (ratio > 85) strideImpact = (ratio - 85) * 0.05;
            else if (ratio < 75) strideImpact = (75 - ratio) * 0.02;
        } else {
            // Dip-and-Drive 理想在 80-95%，容許較長步幅
            if (ratio > 95) strideImpact = (ratio - 95) * 0.04;
            else if (ratio < 80) strideImpact = (80 - ratio) * 0.02;
        }

        const finalMult = (baseLoad + strideImpact) * timing;

        // UI 更新
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('multText').innerText = finalMult.toFixed(2) + "x";
        
        const bar = document.getElementById('gaugeBar');
        const tag = document.getElementById('statusTag');
        const percent = (finalMult / 2.0) * 100;
        bar.style.width = Math.min(percent, 100) + "%";

        if (finalMult < 1.2) {
            bar.style.background = "#34C759";
            tag.style.background = "#34C759";
            tag.innerText = "優良區域";
        } else if (finalMult < 1.5) {
            bar.style.background = "#FFCC00";
            tag.style.background = "#FFCC00";
            tag.innerText = "注意負荷";
        } else {
            bar.style.background = "#FF3B30";
            tag.style.background = "#FF3B30";
            tag.innerText = "高受傷風險";
        }

        document.getElementById('analysisText').innerHTML = `
            <strong>數據分析：</strong><br>
            當前步幅為身高的 ${ratio.toFixed(1)}%。<br>
            ${mode === 'tall' ? 'Tall-and-Fall 模式依賴重力，建議保持穩定的重心轉移。' : 'Dip-and-Drive 模式強調後腳推蹬，請確保前腳著地時支撐強韌。'}<br>
            ${timing > 1 ? '⚠️ 啟動時機偏差是造成負荷上升的主因，建議加強核心與手臂的協調性。' : '✅ 動作時機良好，能有效傳導力量。'}
        `;
    }

    // 初始化
    updateRange();
</script>

</body>
</html>
