<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階投球生物力學分析：肩肘應力拆解</title>
    <style>
        :root {
            --primary: #1c1c1e;
            --elbow: #FF9500;
            --shoulder: #5856D6;
            --safe: #34C759;
            --danger: #FF3B30;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; font-size: 1.2rem; margin-bottom: 20px; }

        .section {
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f8fa;
            border-radius: 18px;
        }

        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; color: #8e8e93; }

        select, input[type="number"] {
            width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 1rem; box-sizing: border-box;
        }

        .slider-box { text-align: center; }
        input[type="range"] { width: 100%; margin: 15px 0; }

        .info-row { display: flex; justify-content: space-between; font-weight: bold; }

        .btn {
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        /* 分析結果樣式 */
        #resultArea { display: none; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }

        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }

        .stat-card { background: #fff; padding: 12px; border-radius: 16px; border: 1px solid #f0f0f0; text-align: center; }
        .stat-label { font-size: 0.7rem; color: #8e8e93; font-weight: 600; margin-bottom: 4px; }
        .stat-value { font-size: 1.5rem; font-weight: 800; }

        .bar-container { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: 0.8s ease; }

        .report-box { background: #f1f7ff; padding: 15px; border-radius: 14px; font-size: 0.85rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <h1>投球生物力學分析 (進階版)</h1>

    <div class="section">
        <label>投手身高 (cm)</label>
        <input type="number" id="height" value="180" oninput="updateRange()">
        
        <label style="margin-top:15px;">投球模式</label>
        <select id="mode">
            <option value="tall">高壓式 (Tall-and-Fall)</option>
            <option value="drive">下沉式 (Dip-and-Drive)</option>
        </select>
    </div>

    <div class="section">
        <label>跨步距離</label>
        <div class="slider-box">
            <div class="info-row">
                <span id="labelCm">144 cm</span>
                <span id="labelPct" style="color:var(--shoulder)">80%</span>
            </div>
            <input type="range" id="strideRange" oninput="syncLabels(this.value)">
        </div>
    </div>

    <div class="section">
        <label>啟動時機 (Timing)</label>
        <select id="timing">
            <option value="1.0">同步 (Perfect Timing)</option>
            <option value="1.3">過早開胸 (Early Rotation)</option>
            <option value="1.1">手臂滯後 (Arm Drag)</option>
        </select>
    </div>

    <button class="btn" onclick="analyze()">生成生物力學報告</button>

    <div id="resultArea">
        <div class="analysis-grid">
            <div class="stat-card">
                <div class="stat-label">肘關節內翻力矩</div>
                <div id="elbowVal" class="stat-value" style="color:var(--elbow)">1.00x</div>
                <div class="bar-container"><div id="elbowBar" class="bar-fill" style="background:var(--elbow)"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">肩關節拉伸應力</div>
                <div id="shoulderVal" class="stat-value" style="color:var(--shoulder)">1.00x</div>
                <div class="bar-container"><div id="shoulderBar" class="bar-fill" style="background:var(--shoulder)"></div></div>
            </div>
        </div>
        
        <div class="report-box" id="reportContent"></div>
    </div>
</div>

<script>
    function updateRange() {
        const h = document.getElementById('height').value;
        const r = document.getElementById('strideRange');
        r.min = h * 0.5; r.max = h * 1.2;
        syncLabels(r.value);
    }

    function syncLabels(v) {
        const h = document.getElementById('height').value;
        document.getElementById('labelCm').innerText = v + " cm";
        document.getElementById('labelPct').innerText = ((v/h)*100).toFixed(1) + "%";
    }

    function analyze() {
        const h = parseFloat(document.getElementById('height').value);
        const s = parseFloat(document.getElementById('strideRange').value);
        const timing = parseFloat(document.getElementById('timing').value);
        const mode = document.getElementById('mode').value;
        const ratio = (s / h) * 100;

        // --- 核心運算邏輯 ---
        
        // 1. 肘關節內翻力矩 (高度受 Timing 影響)
        let elbowTorque = 1.0;
        if (timing > 1.0) elbowTorque *= timing; // Timing 偏差直接加成到力矩
        if (mode === 'tall' && ratio > 88) elbowTorque *= 1.1; // 高壓式若步幅過大，槓桿效應增加力矩

        // 2. 肩關節拉伸應力 (高度受步幅/動力鏈影響)
        let shoulderStress = 1.0;
        let ideal = (mode === 'tall') ? 80 : 88;
        let diff = Math.abs(ratio - ideal);
        shoulderStress += (diff * 0.02); // 步幅偏差導致末端減速負擔增加
        if (timing === 1.3) shoulderStress *= 1.15; // 開胸過早導致肩膀代償拉力

        // 更新 UI
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('elbowVal').innerText = elbowTorque.toFixed(2) + "x";
        document.getElementById('shoulderVal').innerText = shoulderStress.toFixed(2) + "x";
        
        document.getElementById('elbowBar').style.width = Math.min((elbowTorque/2)*100, 100) + "%";
        document.getElementById('shoulderBar').style.width = Math.min((shoulderStress/2)*100, 100) + "%";

        document.getElementById('reportContent').innerHTML = `
            <strong>力學診斷：</strong><br>
            • <b>肘關節</b>：${elbowTorque > 1.2 ? '⚠️內翻力矩過高，UCL 受傷風險增加。' : '✅力矩控制良好。'}<br>
            • <b>肩關節</b>：${shoulderStress > 1.2 ? '⚠️拉伸應力偏大，注意旋轉肌群疲勞。' : '✅應力負荷正常。'}<br>
            • <b>建議</b>：${timing > 1.1 ? '優先修正開胸時機，這對降低肘部力矩最有效。' : '目前的動作結構穩定，建議維持。'}
        `;
    }
    updateRange();
</script>
</body>
</html>
