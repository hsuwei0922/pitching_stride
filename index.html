<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階投球步幅與生物力學負荷分析</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --safe: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 25px;
        }

        .section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: var(--primary);
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        /* 滑桿樣式 */
        .slider-container {
            padding: 10px 0;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .value-display {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background: #1a252f; }

        /* 儀表板 */
        #resultView {
            display: none;
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .multiplier {
            font-size: 3rem;
            font-weight: 800;
            margin: 10px 0;
        }

        .gauge-bar {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 6px;
            margin: 15px 0;
            overflow: hidden;
        }

        .gauge-fill {
            width: 0%;
            height: 100%;
            background: var(--safe);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .tips {
            text-align: left;
            font-size: 0.85rem;
            color: #666;
            margin-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>投球動力鏈與負荷分析</h1>

    <div class="section">
        <label>投手身高 (cm)</label>
        <input type="number" id="height" value="180" oninput="syncStride()">
        
        <label>跨步模式</label>
        <select id="strideMode">
            <option value="1.0">高抬腿 (High Leg Kick)</option>
            <option value="0.95">滑步 (Slide Step)</option>
            <option value="1.05">慢速跨步 (Slow Windup)</option>
        </select>
    </div>

    <div class="section">
        <label>跨步距離 (cm)</label>
        <input type="range" id="strideRange" min="100" max="200" value="144" oninput="updateStrideVal(this.value)">
        <div class="value-display"><span id="strideVal">144</span> cm</div>
    </div>

    <div class="section">
        <label>手臂啟動時機 (Timing)</label>
        <select id="timing">
            <option value="1.0">正常 (On Time)</option>
            <option value="1.3">過早 (Early - 身體太快開胸)</option>
            <option value="1.1">略晚 (Late - 拖重感)</option>
        </select>
    </div>

    <button class="btn" onclick="analyze()">生成分析報告</button>

    <div id="resultView">
        <div style="color: #888; font-size: 0.9rem;">估計肩肘負荷倍數</div>
        <div id="multDisplay" class="multiplier">1.0x</div>
        
        <div class="gauge-bar">
            <div id="gaugeFill" class="gauge-fill"></div>
        </div>

        <div id="riskBadge" class="badge">計算中...</div>
        
        <div class="tips" id="tipContent"></div>
    </div>
</div>

<script>
    function updateStrideVal(val) {
        document.getElementById('strideVal').innerText = val;
    }

    function syncStride() {
        const h = document.getElementById('height').value;
        const slider = document.getElementById('strideRange');
        // 自動調整滑桿範圍至身高 50% ~ 120%
        slider.min = Math.round(h * 0.5);
        slider.max = Math.round(h * 1.2);
    }

    function analyze() {
        const height = parseFloat(document.getElementById('height').value);
        const stride = parseFloat(document.getElementById('strideRange').value);
        const modeModifier = parseFloat(document.getElementById('strideMode').value);
        const timingModifier = parseFloat(document.getElementById('timing').value);

        const strideRatio = (stride / height) * 100;
        
        // 核心運算：基礎負荷 + 步幅偏差 + Timing偏差 + 模式修正
        let baseLoad = 1.0;
        
        // 步幅比影響 (理想範圍 75-85%)
        let strideImpact = 0;
        if (strideRatio > 85) {
            strideImpact = (strideRatio - 85) * 0.04;
        } else if (strideRatio < 75) {
            strideImpact = (75 - strideRatio) * 0.02;
        }

        // 最終負荷計算
        let totalMultiplier = (baseLoad + strideImpact) * modeModifier * timingModifier;

        // UI 更新
        document.getElementById('resultView').style.display = 'block';
        document.getElementById('multDisplay').innerText = totalMultiplier.toFixed(2) + 'x';
        
        const fill = document.getElementById('gaugeFill');
        const badge = document.getElementById('riskBadge');
        const progress = (totalMultiplier / 2.0) * 100;
        fill.style.width = Math.min(progress, 100) + '%';

        if (totalMultiplier < 1.25) {
            fill.style.background = '#27ae60';
            badge.style.background = '#27ae60';
            badge.innerText = '安全範圍';
        } else if (totalMultiplier < 1.55) {
            fill.style.background = '#f39c12';
            badge.style.background = '#f39c12';
            badge.innerText = '中度風險';
        } else {
            fill.style.background = '#e74c3c';
            badge.style.background = '#e74c3c';
            badge.innerText = '高度受傷危險';
        }

        let tipHtml = `
            <strong>分析摘要：</strong><br>
            • 當前步幅比：${strideRatio.toFixed(1)}%<br>
            • Timing 影響：${timingModifier > 1 ? '由於啟動時機不佳，負荷增加了 ' + Math.round((timingModifier-1)*100) + '%' : '時機掌握良好'}<br>
            • 建議方案：${strideRatio > 85 ? '縮短步幅以穩定重心，避免軀幹過早開胸。' : '可適度增加步幅以提升下肢動力傳導效率。'}
        `;
        document.getElementById('tipContent').innerHTML = tipHtml;
    }

    // 初始同步
    syncStride();
</script>

</body>
</html>
