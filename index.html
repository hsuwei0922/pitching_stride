<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投球生物力學：負荷與速度潛力分析</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #007AFF;
            --velo: #5856D6;
            --safe: #34C759;
            --warning: #FFCC00;
            --danger: #FF3B30;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        h1 {
            text-align: center;
            font-size: 1.25rem;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .section {
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f8fa;
            border-radius: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .slider-box { text-align: center; }

        input[type="range"] {
            width: 100%;
            margin: 15px 0;
            -webkit-appearance: none;
            background: #ddd;
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .stride-info {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 結果顯示區 */
        #resultArea {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #f0f0f0;
            text-align: center;
        }

        .stat-label { font-size: 0.75rem; color: #999; font-weight: 600; margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        
        .potential-value { color: var(--velo); }

        .bar-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: 0.8s ease; }

        .analysis-box {
            background: #f1f7ff;
            padding: 15px;
            border-radius: 14px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #334;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Pitching Bio-Analysis</h1>

    <div class="section">
        <label>投手身高 (cm)</label>
        <input type="number" id="height" value="180" oninput="updateRange()">
        
        <label style="margin-top:15px;">投球模式</label>
        <select id="pitchingMode">
            <option value="tall">高壓式 (Tall-and-Fall)</option>
            <option value="drive">下沉式 (Dip-and-Drive)</option>
        </select>
    </div>

    <div class="section">
        <label>跨步距離</label>
        <div class="slider-box">
            <div class="stride-info">
                <span id="displayCm">144 cm</span>
                <span id="displayPct" style="color:var(--accent)">80.0%</span>
            </div>
            <input type="range" id="strideSlider" oninput="syncLabels(this.value)">
        </div>
    </div>

    <div class="section">
        <label>時機控制 (Timing)</label>
        <select id="timing">
            <option value="1.0">完美 (On Time)</option>
            <option value="1.2">過早開胸 (Early Rotation)</option>
            <option value="1.1">動力滯後 (Arm Drag)</option>
        </select>
    </div>

    <button class="btn" onclick="runAnalysis()">產生分析報告</button>

    <div id="resultArea">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">肩肘負荷預估</div>
                <div id="multText" class="stat-value">1.00x</div>
                <div class="bar-bg"><div id="loadBar" class="bar-fill"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">球速潛力發揮</div>
                <div id="veloText" class="stat-value potential-value">0%</div>
                <div class="bar-bg"><div id="veloBar" class="bar-fill" style="background:var(--velo)"></div></div>
            </div>
        </div>
        
        <div class="analysis-box" id="analysisText"></div>
    </div>
</div>

<script>
    function updateRange() {
        const h = document.getElementById('height').value;
        const s = document.getElementById('strideSlider');
        s.min = Math.round(h * 0.5);
        s.max = Math.round(h * 1.2);
        syncLabels(s.value);
    }

    function syncLabels(val) {
        const h = document.getElementById('height').value;
        const pct = ((val / h) * 100).toFixed(1);
        document.getElementById('displayCm').innerText = val + " cm";
        document.getElementById('displayPct').innerText = pct + "%";
    }

    function runAnalysis() {
        const h = parseFloat(document.getElementById('height').value);
        const s = parseFloat(document.getElementById('strideSlider').value);
        const mode = document.getElementById('pitchingMode').value;
        const timing = parseFloat(document.getElementById('timing').value);
        
        const ratio = (s / h) * 100;
        
        // 1. 負荷計算邏輯
        let loadMult = 1.0;
        if (mode === 'tall') {
            if (ratio > 85) loadMult += (ratio - 85) * 0.05;
            else if (ratio < 75) loadMult += (75 - ratio) * 0.02;
        } else {
            if (ratio > 95) loadMult += (ratio - 95) * 0.04;
            else if (ratio < 80) loadMult += (80 - ratio) * 0.02;
        }
        loadMult *= timing;

        // 2. 球速潛力計算邏輯 (理想步幅 + 完美 Timing = 100%)
        let potential = 100;
        let diff = 0;
        if (mode === 'tall') {
            diff = Math.abs(ratio - 80); // Tall-and-fall 理想 80%
        } else {
            diff = Math.abs(ratio - 88); // Dip-and-drive 理想 88%
        }
        potential -= (diff * 1.5); // 步幅每偏離理想值 1%，潛力下降 1.5%
        
        if (timing === 1.2) potential -= 20; // 開胸過早，力量流失 20%
        if (timing === 1.1) potential -= 10; // 手臂滯後，力量流失 10%
        
        potential = Math.max(potential, 40); // 最低保底 40%

        // UI 更新
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('multText').innerText = loadMult.toFixed(2) + "x";
        document.getElementById('veloText').innerText = Math.round(potential) + "%";
        
        const loadBar = document.getElementById('loadBar');
        const veloBar = document.getElementById('veloBar');
        
        loadBar.style.width = Math.min((loadMult / 2) * 100, 100) + "%";
        loadBar.style.background = loadMult < 1.3 ? "#34C759" : (loadMult < 1.6 ? "#FFCC00" : "#FF3B30");
        
        veloBar.style.width = potential + "%";

        document.getElementById('analysisText').innerHTML = `
            <strong>教練點評：</strong><br>
            您的步幅比為 ${ratio.toFixed(1)}%。<br>
            ${potential > 90 ? '✅ 動力鏈銜接優異，能有效將下肢力量轉換為球速。' : '⚠️ 能量傳導存在流失，建議優化跨步距離。'}<br>
            ${loadMult > 1.5 ? '🔴 警告：目前動作對肩肘壓力過大，建議調整 Timing 以降低負擔。' : '🟢 目前身體負荷處於安全區間。'}
        `;
    }

    updateRange();
</script>

</body>
</html>
